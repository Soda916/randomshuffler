  描述: 隨機排序工具
  編碼: UTF-8

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>隨機排序工具</title>
  <style>
  #app { padding: 1.5rem 0; font-family: var(--font-sans); }
  #input-area { display: flex; gap: 8px; margin-bottom: 1rem; }
  #seq-input { flex: 1; font-size: 15px; }
  #add-btn { white-space: nowrap; font-size: 14px; padding: 0 16px; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; min-height: 44px; align-items: flex-start; }
  .tag { display: inline-flex; align-items: center; gap: 6px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 12px; font-size: 14px; color: var(--color-text-primary); cursor: default; user-select: none; }
  .tag .del { cursor: pointer; color: var(--color-text-tertiary); font-size: 12px; line-height: 1; transition: color 0.15s; }
  .tag .del:hover { color: var(--color-text-primary); }
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 1.25rem 0; }
  .result-row { display: flex; flex-wrap: wrap; gap: 8px; min-height: 44px; align-items: flex-start; }
  .r-tag { display: inline-flex; align-items: center; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 6px 12px; font-size: 14px; color: var(--color-text-primary); }
  .r-tag.hi { border-color: #7F77DD; color: #7F77DD; background: #EEEDFE; }
  .controls { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .label-sm { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; }
  .empty-hint { font-size: 13px; color: var(--color-text-tertiary); }
  #copy-btn { margin-left: auto; }
  @media (max-width: 500px) {
    #input-area { flex-direction: column; }
    #copy-btn { margin-left: 0; }
  }
</style>
</head>
<body>
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">隨機排序工具：輸入序列後一鍵打亂</h2>
<div id="app">
  <div id="input-area">
    <input id="seq-input" type="text" placeholder="輸入項目，按 Enter 或逗號分隔加入" />
    <button id="add-btn" onclick="addFromInput()">加入</button>
  </div>
  <div class="label-sm">目前序列（點 × 可刪除）</div>
  <div class="tag-row" id="source-tags"><span class="empty-hint">還沒有項目</span></div>
  <div class="controls">
    <button onclick="shuffle()"><i class="ti ti-refresh" aria-hidden="true" style="font-size:15px;vertical-align:-2px;margin-right:4px"></i>打亂</button>
    <button onclick="resetResult()">清除結果</button>
    <button onclick="clearAll()"><i class="ti ti-trash" aria-hidden="true" style="font-size:15px;vertical-align:-2px;margin-right:4px"></i>清空全部</button>
    <button id="copy-btn" onclick="copyResult()"><i class="ti ti-copy" aria-hidden="true" style="font-size:15px;vertical-align:-2px;margin-right:4px"></i>複製結果</button>
  </div>
  <hr class="divider">
  <div class="label-sm">打亂結果</div>
  <div class="result-row" id="result-tags"><span class="empty-hint">按「打亂」產生結果</span></div>
</div>
<script>
  let items = [];
  let shuffled = [];

  const input = document.getElementById('seq-input');
  const sourceTags = document.getElementById('source-tags');
  const resultTags = document.getElementById('result-tags');

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addFromInput(); }
  });

  function addFromInput() {
    const raw = input.value.trim().replace(/，/g, ',');
    const parts = raw.split(',').map(s => s.trim()).filter(Boolean);
    parts.forEach(p => { if (p) items.push(p); });
    input.value = '';
    renderSource();
  }

  function removeItem(i) {
    items.splice(i, 1);
    renderSource();
  }

  function renderSource() {
    if (items.length === 0) {
      sourceTags.innerHTML = '<span class="empty-hint">還沒有項目</span>';
      return;
    }
    sourceTags.innerHTML = items.map((item, i) =>
      `<span class="tag">${esc(item)}<span class="del" onclick="removeItem(${i})" title="移除">✕</span></span>`
    ).join('');
  }

  function shuffle() {
    if (items.length === 0) return;
    shuffled = [...items];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    renderResult(true);
  }

  function renderResult(animate) {
    if (shuffled.length === 0) {
      resultTags.innerHTML = '<span class="empty-hint">按「打亂」產生結果</span>';
      return;
    }
    resultTags.innerHTML = shuffled.map((item, i) =>
      `<span class="r-tag" style="animation-delay:${i * 40}ms">${esc(item)}</span>`
    ).join('');
    if (animate) {
      const tags = resultTags.querySelectorAll('.r-tag');
      tags.forEach((t, i) => {
        t.style.opacity = '0';
        t.style.transform = 'translateY(6px)';
        t.style.transition = `opacity 0.2s ${i*40}ms, transform 0.2s ${i*40}ms`;
        requestAnimationFrame(() => requestAnimationFrame(() => {
          t.style.opacity = '1';
          t.style.transform = 'translateY(0)';
        }));
      });
    }
  }

  function resetResult() {
    shuffled = [];
    renderResult(false);
  }

  function clearAll() {
    items = [];
    shuffled = [];
    renderSource();
    renderResult(false);
  }

  function copyResult() {
    if (shuffled.length === 0) return;
    const text = shuffled.join(', ');
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      const orig = btn.innerHTML;
      btn.innerHTML = '<i class="ti ti-check" aria-hidden="true" style="font-size:15px;vertical-align:-2px;margin-right:4px"></i>已複製';
      setTimeout(() => btn.innerHTML = orig, 1500);
    });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
